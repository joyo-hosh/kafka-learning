name: Deploy Spring Boot Application to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code from the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up JDK 17 for building the Spring Boot application
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Step 3: Build the Spring Boot application using Maven
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # Step 4: Deploy the built JAR file to EC2 instance
    - name: Deploy to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "target/*.jar"
        target: "/home/ubuntu/app/"

    # Step 5: SSH into the EC2 instance and run the application
    - name: Run application on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/app
          latestJar=$(find . -name "*.jar" -not -name "app.jar" | head -n 1)
          echo "Found JAR: $latestJar"
          if [ -z "$latestJar" ]; then
            echo "Error: No JAR file found"
            exit 1
          fi
          
          # Kill existing application and wait
          PID=$(pgrep -f "java -jar /home/ubuntu/app/app.jar") || true
          if [ -n "$PID" ]; then
            echo "Killing existing application with PID: $PID"
            kill -15 $PID || true
            sleep 3
            # Force kill if still running
            kill -9 $PID 2>/dev/null || true
          fi
          
          # Remove old app.jar if it exists
          rm -f app.jar
          cp "$latestJar" app.jar

          sleep 2
          nohup java -jar /home/ubuntu/app/app.jar > /home/ubuntu/app/app.log 2>&1 &
          sleep 5
          pgrep -f app.jar && echo "Application started successfully" || echo "Failed to start application"